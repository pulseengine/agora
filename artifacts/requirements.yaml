artifacts:
  # ---- Requirements ----------------------------------------------------------
  - id: REQ-AGORA-001
    type: requirement
    title: Real-time named-agent coordination on channels
    status: verified
    description: >
      Named agents shall coordinate in real time by publishing/subscribing to
      named channels (find each other, ask, propose, agree) — AUGMENTING, not
      replacing, the existing async GitHub-issue coordination loop.
    tags: [core, coordination]
    fields:
      priority: must
      category: functional
      baseline: v0.1.0

  - id: REQ-AGORA-002
    type: requirement
    title: Durable, auditable, signed record of every message
    status: implemented
    description: >
      Every coordination message shall be a durable, traceable fact mirrored into
      rivet, carrying a sigil signature — preserving the org's "everything is a
      typed, traceable artifact" property that the async issue model has for free.
      NOTE: facts-as-YAML mirror is implemented; the real sigil signature is
      stubbed (FNV) and blocked on sigil#164 (GitHub issue #3).
    tags: [core, audit]
    fields:
      priority: must
      category: functional
      baseline: v0.1.0

  - id: REQ-AGORA-003
    type: requirement
    title: Capability channel-scoping (structural cross-talk prevention)
    status: verified
    description: >
      An agent shall only emit to / receive from channels it was explicitly
      granted a handle to. With no ambient authority and unforgeable handles, an
      agent cannot generate or hear cross-talk on channels it holds no handle to.
    tags: [cross-talk, security, structural]
    fields:
      priority: must
      category: non-functional
      baseline: v0.1.0

  - id: REQ-AGORA-004
    type: requirement
    title: Unconditional self-echo filter
    status: verified
    description: >
      Messages whose signed sender equals the receiving agent shall be dropped on
      EVERY channel; the filter must not be per-channel overridable. (Hermes
      postmortem rule #1 — a conditional filter caused an infinite ack-loop.)
    tags: [cross-talk, runtime]
    fields:
      priority: must
      category: constraint
      baseline: v0.1.0

  - id: REQ-AGORA-005
    type: requirement
    title: Cascade bounding via hop-count / TTL
    status: verified
    description: >
      Every message shall carry a hop budget that decrements on each re-emission;
      at zero it is not re-amplified. This structurally bounds the reaction
      cascade that is otherwise the Hermes infinite-loop failure mode.
    tags: [cross-talk, runtime]
    fields:
      priority: must
      category: constraint
      baseline: v0.1.0

  - id: REQ-AGORA-006
    type: requirement
    title: Signed per-persona identity
    status: implemented
    description: >
      Each agent persona shall have a cryptographically distinct sigil identity so
      self and peer are distinguishable even though all personas share one account.
      (Hermes rule #3 — sender-TYPE filtering is too coarse.)
    tags: [cross-talk, security]
    fields:
      priority: must
      category: non-functional
      baseline: v0.1.0

  - id: REQ-AGORA-007
    type: requirement
    title: Out-of-band human control plane
    status: implemented
    description: >
      A privileged human STOP/kill shall exist at the gateway layer (via thrum),
      NOT as an in-channel message the agent may ignore. (Hermes rule #2 — an
      in-band "stop" was treated as another turn; only pkill worked.)
    tags: [cross-talk, human-in-loop]
    fields:
      priority: must
      category: constraint
      baseline: v0.3.0

  - id: REQ-AGORA-008
    type: requirement
    title: WIT-typed messages with speech acts
    status: verified
    description: >
      The coordination protocol shall be a WIT contract; messages carry a typed
      speech act (inform/request/propose/agree/refuse) — the structural intent
      layer. (Necessary, not sufficient, for semantic agreement.)
    tags: [protocol]
    fields:
      priority: must
      category: functional
      baseline: v0.1.0

  - id: REQ-AGORA-009
    type: requirement
    title: Global ordering and late-join replay
    status: implemented
    description: >
      The durable spine shall provide per-stream global ordering and durable
      consumers so a late-joining agent replays from its last position — the
      org-level generalization of the issue-hunt watermark/pending_gates pattern.
    tags: [durability]
    fields:
      priority: must
      category: functional
      baseline: v0.3.0

  - id: REQ-AGORA-010
    type: requirement
    title: Coordination logic as verified, signed wasm components
    status: implemented
    description: >
      Coordination logic shall be WIT-typed wasm components, composed with WAC,
      verified with witness (MC/DC) + scry, and sigil-signed. "WCM to the extreme"
      applies to the LOGIC + capabilities + verification, NOT the durable transport.
      NOTE: built as a wasm component (native wasm32-wasip2); full verification
      (witness MC/DC + scry) is the v0.2.0 five-track dogfood (GitHub issue #8).
    tags: [wcm, verification]
    fields:
      priority: must
      category: functional
      baseline: v0.2.0

  - id: REQ-AGORA-011
    type: requirement
    title: Hermetic wasm-component build on native WASI 0.2 (wasm32-wasip2)
    status: verified
    description: >
      The agent component shall build hermetically via the PulseEngine standard
      ruleset rules_wasm_component (Bazel) targeting native component-model WASI
      (wasm32-wasip2, no legacy preview1 adapter), with wasi-sdk 29 = WASI 0.2.6.
      A cargo-component quick path is retained behind a feature gate. WASI Preview 3
      (ratified 2026-06-11) is the recorded direction: it pays off at the durable
      transport seam (stream<T>/future<T> <-> JetStream) and the wasmtime-43 host,
      not the pure coordination component (whose wasip3 target is still tier-3 and
      whose std still emits p2 imports). See README "WASI: on p2 now, p3 is the
      direction".
    tags: [wcm, build, wasi, bazel]
    fields:
      priority: must
      category: non-functional
      baseline: v0.1.0

  - id: REQ-AGORA-012
    type: requirement
    title: Bounded decision — owner-decides within a deadline
    status: implemented
    description: >
      Coordination shall drive toward a single decision owned by an accountable
      agent and finalized within a deadline. The owner's call is authoritative
      (owner-decides breaks ties, so deliberation cannot deadlock), and the deadline
      bounds the WHOLE deliberation — a control distinct from the per-message hop
      budget (which bounds a single message's cascade). Prevents the failure mode
      where agents deliberate without ever concluding.
    tags: [coordination, runtime]
    fields:
      priority: must
      category: functional
      baseline: v0.3.0

  # ---- Features --------------------------------------------------------------
  - id: FEAT-AGORA-SPIKE
    type: feature
    title: Lighter-path spike (NATS-core + wasmtime + WAC)
    status: implemented
    description: >
      Runnable spike (agent/ + host/). VERIFICATION EVIDENCE — the spike run
      demonstrated, on a real wasm component: capability-scoping (8 ungranted
      `secret-ops` deliveries blocked), unconditional self-echo filter (12 own
      echoes dropped), hop-count TTL (cascade bounded 3->2->1->0, converged), and
      6 signed facts written to facts/coordination.yaml. In-memory bus stands in
      for NATS; sigil signature stubbed; out-of-band thrum kill not yet built.
    tags: [spike]
    fields:
      phase: phase-1
      baseline: v0.1.0
    links:
      - type: satisfies
        target: REQ-AGORA-001
      - type: satisfies
        target: REQ-AGORA-002
      - type: satisfies
        target: REQ-AGORA-003
      - type: satisfies
        target: REQ-AGORA-004
      - type: satisfies
        target: REQ-AGORA-005
      - type: satisfies
        target: REQ-AGORA-006
      - type: satisfies
        target: REQ-AGORA-008
      - type: satisfies
        target: REQ-AGORA-010

  - id: FEAT-AGORA-BAZEL
    type: feature
    title: Hermetic Bazel build + native WASI p2 migration
    status: verified
    description: >
      The agent component builds via rules_wasm_component (wit_library +
      rust_wasm_component_bindgen) for wasm32-wasip2; the cargo-component path is
      retained behind the `cargo-bindgen` feature. The host loads the p2 component
      and the spike runs identically. Docs record the WASI p3 adoption path.
    tags: [build, bazel, wasi]
    fields:
      phase: phase-1
      baseline: v0.1.0
    links:
      - type: satisfies
        target: REQ-AGORA-011
      - type: satisfies
        target: REQ-AGORA-010
