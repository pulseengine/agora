artifacts:
  # Architecture decisions, grounded in three deep-research runs (2026-06).
  - id: AD-AGORA-001
    type: design-decision
    title: agora is a new project, not a rivet extension
    status: accepted
    description: >
      agora is a separate project that SYNCS coordination facts INTO rivet for the
      record, rather than living inside rivet.
    rationale: >
      rivet is already overloaded (CLI + graph + schemas + MCP + compliance);
      overloading it with a live bus couples two concerns and risks the durable
      record. Separation keeps rivet lean and lets the channel evolve independently.
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-AGORA-002
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-002
    type: design-decision
    title: The channel is a distributed transport, not MCP
    status: accepted
    description: >
      The channel must be a networked transport layer; MCP stays the local
      agent<->tool seam only.
    rationale: >
      MCP's single-client request/response model cannot express many-to-many
      pub/sub; two agents each have their own local rivet MCP with nothing between
      them. Forcing MCP into the bus role misuses the protocol.
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-AGORA-001
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-003
    type: design-decision
    title: Durable spine is native NATS/JetStream, not wasm
    status: accepted
    description: >
      The durable spine is an irreducible native trust base (NATS/JetStream),
      owned consciously; wasm carries the logic, not the transport.
    rationale: >
      wasi:messaging explicitly disclaims persistence/ack/guaranteed-delivery and
      wRPC is RPC not pub/sub; even wasmCloud's transport providers are native.
      Reimplementing durable fan-out in wasm reinvents NATS with less maturity.
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-AGORA-009
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-004
    type: design-decision
    title: Lighter path (NATS-core + wasmtime + WAC); wasmCloud is the graduation path
    status: accepted
    description: >
      Build on NATS-core + wasm coordination components on wasmtime, composed with
      WAC; wasmCloud (lattice/wadm/providers) is the graduation path.
    rationale: >
      A lighter stack minimizes the dependency/operational surface for a small
      team; the spike showed the only friction is one-time host-embedding plumbing
      (the wasmtime-wasi WasiView boilerplate), acceptable vs running wasmCloud.
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-AGORA-010
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-005
    type: design-decision
    title: Augment, do not replace, GitHub-issue coordination
    status: accepted
    description: >
      agora adds a real-time layer; the durable record (facts in rivet) is preserved.
    rationale: >
      The async GitHub-issue loop is cross-talk-resistant by accident (rate-limited,
      durable, addressed, one-actor-at-a-time). Replacing it would discard a working
      safety property; augmenting adds low-latency convergence without losing it.
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-AGORA-001
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-006
    type: design-decision
    title: Capability-scoping for structural cross-talk prevention; signing for provenance
    status: accepted
    description: >
      WASI unforgeable handles + no ambient authority eliminate the reachability
      class of cross-talk by construction; sigil signing retained for provenance.
    rationale: >
      Capability-scoping makes whole cross-talk classes unreachable by construction
      (the strongest control), but research refuted totality claims (confused-deputy
      remains), so sigil-signed identity is kept for provenance and self/peer
      distinguishability.
    tags: [architecture, cross-talk]
    links:
      - type: satisfies
        target: REQ-AGORA-003
      - type: satisfies
        target: REQ-AGORA-006
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-007
    type: design-decision
    title: Runtime cross-talk control set (Hermes-postmortem-derived)
    status: accepted
    description: >
      Cross-talk classes not preventable structurally get runtime controls:
      unconditional self-echo filter, hop-count/TTL, idempotency, an out-of-band
      human kill at the gateway, a bounded decision (owner-decides + deadline) so
      deliberation concludes rather than looping, and a lease/optimistic-commit so a
      shared task is done once rather than duplicated.
    rationale: >
      The Hermes (#32791) postmortem shows these failures are real and that
      conditional/in-band controls fail (a per-channel override and an in-band STOP
      both failed); encoding them as unconditional, out-of-band, bounded controls is
      the validated mitigation. Bounding a single message's cascade (hops) is not the
      same as bounding a whole deliberation — the decision deadline + owner-decides
      supplies the latter.
    tags: [architecture, cross-talk]
    links:
      - type: satisfies
        target: REQ-AGORA-004
      - type: satisfies
        target: REQ-AGORA-005
      - type: satisfies
        target: REQ-AGORA-007
      - type: satisfies
        target: REQ-AGORA-012
      - type: satisfies
        target: REQ-AGORA-013
    fields:
      baseline: v0.1.0

  - id: AD-AGORA-008
    type: design-decision
    title: Build hermetically on native WASI 0.2 (wasm32-wasip2) via rules_wasm_component; WASI p3 is the recorded direction
    status: accepted
    description: >
      The agent component builds via the PulseEngine standard ruleset
      rules_wasm_component (Bazel) for wasm32-wasip2 (wasi-sdk 29 = WASI 0.2.6),
      not cargo-component's legacy preview1 default. A cargo path is retained behind
      the `cargo-bindgen` feature for quick iteration.
    rationale: >
      WASI 0.3 (Preview 3) was ratified 2026-06-11, but the Rust wasm32-wasip3
      target is still tier-3 (no prebuilt std; needs nightly + build-std + wasi-sdk
      + a libc patch) and its std still emits p2 imports during the transition — so
      a p3 build today adds major toolchain friction for p2 imports anyway, and the
      agent is pure coordination logic that gains nothing concrete from p3's async
      streams. p3 pays off at the durable transport seam (stream<T>/future<T> map
      onto JetStream; host -> wasmtime 43 p3 async linker), adopted there in v0.3.0.
    tags: [architecture, build, wasi, bazel]
    fields:
      baseline: v0.1.0
    links:
      - type: satisfies
        target: REQ-AGORA-011
      - type: satisfies
        target: REQ-AGORA-010

  - id: AD-AGORA-009
    type: design-decision
    title: Verification framing — STPA-Sec hazard analysis with EU AI Act as the regulatory lens
    status: accepted
    description: >
      agora's verification scaffolding targets STPA + STPA-Sec as the hazard-analysis
      method (safety/ tree: losses -> hazards -> constraints -> UCAs -> scenarios over
      the host/agent control structure) and the EU AI Act as the regulatory framing.
      The AI Act's Annex-IV / Art-9-15 conformance artifact types are enabled in the
      feature-loop pass that authors those documents, not scaffolded empty at bootstrap.
    rationale: >
      agora's load-bearing controls are security + AI-coordination-safety controls, so
      a systems-theoretic SECURITY analysis (STPA-Sec) is the right method — the
      cross-talk control set is literally its output. EU AI Act fits the domain (a
      multi-agent AI coordination system with mandated human oversight: the out-of-band
      kill = Art. 14 human oversight; risk management = Art. 9). Hardware-safety certs
      (DO-178C/ISO 26262/EN 50128) would be a poor fit for coordination infrastructure.
      Integrity level: high-assurance internal infrastructure (no ASIL/DAL/SIL — wrong
      domains); STPA severity drives constraint rigor.
    tags: [architecture, verification, stpa-sec, eu-ai-act]
    fields:
      baseline: v0.1.0
    links:
      - type: satisfies
        target: REQ-AGORA-007
      - type: satisfies
        target: REQ-AGORA-010

  - id: AD-AGORA-010
    type: design-decision
    title: Coordination protocol is a WIT contract with FIPA-style speech acts
    status: accepted
    description: >
      The agent↔agent protocol is a WIT world (`agora:agent`) whose messages carry a
      typed speech act (inform/request/propose/agree/refuse) — the structural intent
      layer, independent of payload.
    rationale: >
      WIT types give the protocol a versioned, language-neutral, machine-checkable
      contract enforced at the component boundary; FIPA-style performatives standardize
      communicative intent (necessary, not sufficient, for semantic agreement). This is
      the structural layer the runtime cross-talk controls and the durable record build on.
    tags: [architecture, protocol]
    fields:
      baseline: v0.1.0
    links:
      - type: satisfies
        target: REQ-AGORA-008
